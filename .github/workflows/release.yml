name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/valinora/ghss/ghss-scanner
          tags: |
            type=sha,format=short,prefix=
            type=semver,pattern=v{{major}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ghss-scanner/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-cli:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: ghss-linux-amd64
            packages: musl-tools
          - target: aarch64-unknown-linux-musl
            artifact: ghss-linux-arm64
            packages: musl-tools gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI binary
        run: cargo build --release --package ghss-cli --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: ${{ matrix.linker || '' }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/ghss ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release-assets:
    runs-on: ubuntu-latest
    needs: [build-and-push, build-cli]
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Attach assets and update release notes
        uses: softprops/action-gh-release@v2
        with:
          files: ghss-*
          append_body: true
          body: |

            ## Docker Image

            ```
            docker pull ghcr.io/valinora/ghss/ghss-scanner:${{ github.event.release.tag_name }}
            ```

            ## CLI Binaries

            | Platform | Download |
            |----------|----------|
            | Linux amd64 | `ghss-linux-amd64` |
            | Linux arm64 | `ghss-linux-arm64` |
